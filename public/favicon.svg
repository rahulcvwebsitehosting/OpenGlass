<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(45,45,45,0.04)"/>
    </pattern>
  </defs>
  <!-- Paper background -->
  <rect width="128" height="128" rx="22" ry="22" fill="#fdfbf7"/>
  <rect width="128" height="128" rx="22" ry="22" fill="url(#dot)"/>
  <!-- Pencil border -->
  <rect width="128" height="128" rx="22" ry="22" fill="none" stroke="#2d2d2d" stroke-width="3"/>
  <!-- Left lens -->
  <rect x="18" y="44" width="32" height="24" rx="10" fill="none" stroke="#2d2d2d" stroke-width="3"/>
  <!-- Right lens (marker accent) -->
  <rect x="78" y="44" width="32" height="24" rx="10" fill="rgba(255,77,77,0.15)" stroke="#2d2d2d" stroke-width="3"/>
  <!-- Bridge -->
  <path d="M50 56 Q64 48 78 56" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- Left temple -->
  <line x1="4" y1="56" x2="18" y2="56" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- Right temple -->
  <line x1="110" y1="56" x2="124" y2="56" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- AI sparkle in right lens -->
  <path d="M94 54c1 3 1.5 4 3 4-1.5 0-2 1-3 4-1-3-1.5-4-3-4 1.5 0 2-1 3-4z" fill="#ff4d4d"/>
  <!-- Post-it AI badge -->
  <rect x="96" y="4" width="28" height="22" rx="5" fill="#fff9c4" stroke="#2d2d2d" stroke-width="2"/>
  <text x="103" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ff4d4d">AI</text>
</svg>